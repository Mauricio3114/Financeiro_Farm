{% extends "base.html" %}

{% block title %}
    {% if despesa %}Editar Despesa{% else %}Nova Despesa{% endif %} | Financeiro Farm
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{% if despesa %}Editar Despesa{% else %}Nova Despesa{% endif %}</h1>
        <p>Lançamento de despesas gerais</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" class="form-grid two-columns">
        <div class="form-group">
            <label>Farmácia *</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}" {% if despesa and despesa.farmacia_id == farmacia.id %}selected{% endif %}>
                        {{ farmacia.nome_fantasia }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Categoria *</label>
            <input type="text" name="categoria" value="{{ despesa.categoria if despesa else '' }}" required>
        </div>

        <div class="form-group">
            <label>Centro de Custo</label>
            <select name="centro_custo">
                {% set cc = despesa.centro_custo if despesa else '' %}
                <option value="">Selecione</option>
                <option value="Administrativo" {% if cc == 'Administrativo' %}selected{% endif %}>Administrativo</option>
                <option value="Entregas" {% if cc == 'Entregas' %}selected{% endif %}>Entregas</option>
                <option value="Loja" {% if cc == 'Loja' %}selected{% endif %}>Loja</option>
                <option value="RH" {% if cc == 'RH' %}selected{% endif %}>RH</option>
                <option value="Marketing" {% if cc == 'Marketing' %}selected{% endif %}>Marketing</option>
                <option value="Manutenção" {% if cc == 'Manutenção' %}selected{% endif %}>Manutenção</option>
            </select>
        </div>

        <div class="form-group full">
            <label>Descrição *</label>
            <input type="text" name="descricao" value="{{ despesa.descricao if despesa else '' }}" required>
        </div>

        <div class="form-group">
            <label>Valor *</label>
            <input type="text" name="valor" value="{{ despesa.valor if despesa else '' }}" required>
        </div>

        <div class="form-group">
            <label>Data da Despesa *</label>
            <input type="date" name="data_despesa" value="{{ despesa.data_despesa.strftime('%Y-%m-%d') if despesa and despesa.data_despesa else '' }}" required>
        </div>

        <div class="form-group">
            <label>Forma de Pagamento</label>
            <input type="text" name="forma_pagamento" value="{{ despesa.forma_pagamento if despesa else '' }}">
        </div>

        <div class="form-group full">
            <label>Observação</label>
            <textarea name="observacao" rows="4">{{ despesa.observacao if despesa else '' }}</textarea>
        </div>

        <div class="form-actions full">
            <button type="submit" class="btn btn-primary">
                {% if despesa %}Salvar Alterações{% else %}Salvar Despesa{% endif %}
            </button>
            <a href="{{ url_for('despesas.listar_despesas') }}" class="btn btn-secondary">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
