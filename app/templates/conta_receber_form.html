{% extends "base.html" %}

{% block title %}
    {% if conta %}Editar Conta{% else %}Nova Conta{% endif %}
{% endblock %}

{% block content %}

<div class="page-top">
    <h1 class="page-title">
        {% if conta %}Editar Conta a Receber{% else %}Nova Conta a Receber{% endif %}
    </h1>
</div>

<div class="form-card">
    <form method="POST" class="form-grid two-columns">

        <div class="form-group">
            <label>Farmácia *</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for f in farmacias %}
                    <option value="{{ f.id }}"
                        {% if conta and conta.farmacia_id == f.id %}selected{% endif %}>
                        {{ f.nome_fantasia }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Cliente *</label>
            <input type="text" name="cliente_nome" required
                   value="{{ conta.cliente_nome if conta else '' }}">
        </div>

        <div class="form-group full">
            <label>Descrição</label>
            <input type="text" name="descricao"
                   value="{{ conta.descricao if conta else '' }}">
        </div>

        <div class="form-group">
            <label>Valor *</label>
            <input type="text" name="valor" required
                   value="{{ conta.valor if conta else '' }}">
        </div>

        <div class="form-group">
            <label>Data Vencimento *</label>
            <input type="date" name="data_vencimento" required
                   value="{{ conta.data_vencimento.strftime('%Y-%m-%d') if conta and conta.data_vencimento else '' }}">
        </div>

        <div class="form-group">
            <label>Data Recebimento</label>
            <input type="date" name="data_recebimento"
                   value="{{ conta.data_recebimento.strftime('%Y-%m-%d') if conta and conta.data_recebimento else '' }}">
        </div>

        <div class="form-group">
            <label>Valor Recebido</label>
            <input type="text" name="valor_recebido"
                   value="{{ conta.valor_recebido if conta else '' }}">
        </div>

        <div class="form-group full">
            <label>Observação</label>
            <textarea name="observacao" rows="3">{{ conta.observacao if conta else '' }}</textarea>
        </div>

        <div class="form-actions full">
            <button type="submit" class="btn btn-primary">
                {% if conta %}Salvar Alterações{% else %}Salvar{% endif %}
            </button>

            <a href="{{ url_for('contas_receber.listar_contas_receber') }}"
               class="btn btn-secondary">Voltar</a>
        </div>

    </form>
</div>

{% endblock %}
