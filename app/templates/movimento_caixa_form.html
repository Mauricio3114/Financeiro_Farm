{% extends "base.html" %}

{% block title %}Novo Movimento de Caixa | Financeiro Farm{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Novo Movimento de Caixa</h1>
        <p>Lançamento manual de entrada ou saída</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" class="form-grid two-columns">
        <div class="form-group">
            <label>Farmácia *</label>
            <select name="farmacia_id" required>
                <option value="">Selecione</option>
                {% for farmacia in farmacias %}
                    <option value="{{ farmacia.id }}">{{ farmacia.nome_fantasia }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Tipo *</label>
            <select name="tipo" required>
                <option value="">Selecione</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
            </select>
        </div>

        <div class="form-group">
            <label>Categoria *</label>
            <input type="text" name="categoria" required>
        </div>

        <div class="form-group">
            <label>Valor *</label>
            <input type="text" name="valor" required>
        </div>

        <div class="form-group full">
            <label>Descrição *</label>
            <input type="text" name="descricao" required>
        </div>

        <div class="form-group">
            <label>Data do Movimento *</label>
            <input type="date" name="data_movimento" required>
        </div>

        <div class="form-group">
            <label>Origem</label>
            <input type="text" name="origem" placeholder="manual, venda, despesa...">
        </div>

        <div class="form-group full">
            <label>Observação</label>
            <textarea name="observacao" rows="4"></textarea>
        </div>

        <div class="form-actions full">
            <button type="submit" class="btn btn-primary">Salvar Movimento</button>
            <a href="{{ url_for('caixa.listar_caixa') }}" class="btn btn-secondary">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
